 <!DOCTYPE html>
<html>
<head>
<title>AJ Music</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#111827;
color:white;
font-family:Arial;
text-align:center;
padding:30px;
}

.box{
background:#1f2937;
padding:25px;
border-radius:20px;
}

h1{
color:#00d9ff;
}

button, label{
background:#00d9ff;
color:white;
padding:12px 25px;
border-radius:10px;
border:none;
font-size:16px;
cursor:pointer;
}

audio{
width:100%;
margin-top:25px;
}

.download{
display:none;
background:#22c55e;
padding:12px 20px;
border-radius:10px;
color:white;
text-decoration:none;
margin-top:20px;
display:inline-block;
}
</style>

</head>

<body>

<div class="box">

<h1>🎵 AJ Music Player</h1>

<label>
📂 Choose Song
<input type="file" id="song" accept="audio/*" hidden>
</label>

<br><br>

<audio id="player" controls></audio>

<br>

<a id="download" class="download">
⬇️ Download Song
</a>

</div>


<script>

let song=document.getElementById("song");
let player=document.getElementById("player");
let download=document.getElementById("download");


song.onchange=function(){

let file=this.files[0];

if(file){

let url=URL.createObjectURL(file);

player.src=url;

download.href=url;

download.download=file.name;

download.style.display="inline-block";

}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Music Platform</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#08001f,#0066ff);
color:white;
text-align:center;
padding:20px;
}

.app{
max-width:450px;
margin:auto;
background:#111;
padding:25px;
border-radius:25px;
}

h1{
color:#00ffcc;
}

input{
background:white;
padding:10px;
border-radius:10px;
width:90%;
}

.player,.song{
background:#222;
padding:20px;
margin-top:20px;
border-radius:20px;
}

button,.download{
background:#00ffcc;
border:none;
padding:12px;
border-radius:20px;
margin:5px;
font-size:16px;
cursor:pointer;
text-decoration:none;
color:black;
display:inline-block;
}

button:hover,.download:hover{
transform:scale(1.1);
}

audio{
width:100%;
margin-top:15px;
}

#progress,#volume{
width:100%;
}

</style>

</head>


<body>


<div class="app">


<h1>🎵 My Music</h1>

<p>Upload • Listen • Download</p>


<input type="file" id="upload" accept="audio/*">


<div class="player">

<h2 id="name">
No Song Selected
</h2>


<audio id="audio"></audio>


<div>

<button onclick="prev()">⏮</button>

<button onclick="play()">▶️ Play</button>

<button onclick="pause()">⏸ Pause</button>

<button onclick="next()">⏭</button>

</div>


<input type="range" id="progress" value="0">


<p>
<span id="current">0:00</span>
/
<span id="duration">0:00</span>
</p>


<input type="range" id="volume" min="0" max="1" step="0.1" value="1">


</div>



<div id="playlist">

<h2>🎶 Playlist</h2>

</div>



</div>



<script>

let upload=document.getElementById("upload");
let audio=document.getElementById("audio");
let name=document.getElementById("name");
let playlist=document.getElementById("playlist");

let songs=[];
let index=0;


upload.onchange=function(){

let file=this.files[0];

let url=URL.createObjectURL(file);

}

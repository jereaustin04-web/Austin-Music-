<!DOCTYPE html>
<html>
<head>
<title>AJ Music Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:linear-gradient(135deg,#020617,#2563eb,#9333ea);
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

.box{
background:#111827;
padding:25px;
border-radius:20px;
max-width:400px;
margin:auto;
}

h1{
color:#38bdf8;
}

label{
background:#06b6d4;
padding:15px 25px;
border-radius:20px;
display:inline-block;
cursor:pointer;
}

input{
display:none;
}

audio{
width:100%;
margin-top:20px;
}
</style>

</head>

<body>

<div class="box">

<h1>🎧 AJ Music Hub</h1>

<label>
📂 Choose Song
<input type="file" id="song" accept="audio/*">
</label>

<p id="name"></p>

<audio id="player" controls></audio>


</div>


<script>

const song = document.getElementById("song");
const player = document.getElementById("player");
const name = document.getElementById("name");


song.addEventListener("change", function(){

const file = this.files[0];

if(file){

name.innerHTML = "🎵 " + file.name;

const url = URL.createObjectURL(file);

player.src = url;

player.load();

}

});

</script>


</body>
</html>
